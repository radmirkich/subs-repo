name: Merge VLESS subscriptions

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Merge subs
        run: |
          set -e
          OUT_DIR=./docs
          OUT_FILE="$OUT_DIR/combined.sub"
          TMP1=$(mktemp)
          TMP2=$(mktemp)
          mkdir -p "$OUT_DIR"

          URL1="https://77.221.140.160:2096/sub/9ytjm08c11upzxch"
          URL2="https://150.241.75.188:2096/sub/8k1r0ez7cvxecn8i"

          # Для теста с самоподписанными сертификатами используется --insecure.
          # Уберите --insecure после настройки валидных сертификатов.
          curl -s --insecure --max-time 20 "$URL1" > "$TMP1" || true
          curl -s --insecure --max-time 20 "$URL2" > "$TMP2" || true

          # объединяем, удаляем пустые строки и дубликаты
          cat "$TMP1" "$TMP2" | sed '/^\s*$/d' | awk '!seen[$0]++' > "$OUT_FILE"

          rm -f "$TMP1" "$TMP2"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/combined.sub || true
          if ! git diff --quiet --cached; then
            git commit -m "Update combined.sub: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
            git push
          else
            echo "No changes"
          fi
